<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pete v4 — Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #050508;
    --panel:  #0d0d14;
    --panel2: #111118;
    --border: #1a1a28;
    --accent: #7c6cf9;
    --text:   #d4d0ff;
    --muted:  #555570;
    --green:  #22d3a5;
    --orange: #f97316;
    --red:    #ef4444;
    --blue:   #38bdf8;
    --purple: #a855f7;
    --yellow: #eab308;

    /* Lifecycle phase colors */
    --Sinh:   #22d3a5;   /* green  — emerging */
    --Dan:    #38bdf8;   /* blue   — growing  */
    --Chuyen: #f97316;   /* orange — firing   */
    --Dung:   #7c6cf9;   /* purple — stable   */
    --Hoai:   #6b7280;   /* grey   — fading   */
    --Vo:     #1f2937;   /* dark   — silence  */

    --field-emotion:    #f43f5e;
    --field-logic:      #38bdf8;
    --field-reflection: #a855f7;
    --field-visual:     #22d3a5;
    --field-language:   #eab308;
    --field-intuition:  #f97316;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ════════════════════ LEFT: Chat ══════════════════════════ */
  #chat-panel {
    width: 340px;
    min-width: 260px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }

  #chat-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .header-info h1 { font-size: 14px; font-weight: 600; }
  .header-info .sub { font-size: 10px; color: var(--muted); }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); margin-left: auto; flex-shrink: 0;
    transition: background 0.4s;
    box-shadow: 0 0 0 0 var(--muted);
  }
  #status-dot.ready {
    background: var(--green);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(34,211,165,.5); }
    70%  { box-shadow: 0 0 0 8px rgba(34,211,165,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,211,165,0); }
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 14px 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 8px; max-width: 95%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.pete { align-self: flex-start; }

  .avatar {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; margin-top: 2px;
  }
  .pete .avatar { background: linear-gradient(135deg,#2d1f6e,#4c1d95); }
  .user .avatar { background: #1e293b; }

  .bubble {
    padding: 8px 12px; border-radius: 10px;
    font-size: 12px; line-height: 1.5; max-width: 220px;
  }
  .pete .bubble { background: #0f172a; border: 1px solid var(--border); color: var(--text); }
  .user .bubble { background: #1a1a2e; color: #c4b5fd; }

  #input-row {
    display: flex; gap: 8px; padding: 12px;
    border-top: 1px solid var(--border); background: var(--panel);
  }
  #input-row select {
    background: var(--panel2); border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px; padding: 0 8px;
    font-size: 10px; cursor: pointer;
  }
  #msg-input {
    flex: 1; background: var(--panel2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; color: var(--text);
    font-size: 12px; font-family: inherit; resize: none; outline: none;
    transition: border-color .2s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #send-btn {
    width: 34px; height: 34px; border-radius: 8px; border: none;
    background: var(--accent); color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s; flex-shrink: 0;
  }
  #send-btn:hover { background: #6355e8; }
  #send-btn svg { width: 14px; height: 14px; }

  /* ════════════════════ RIGHT: Monitor ══════════════════════════ */
  #monitor {
    flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden;
  }

  #monitor-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex; align-items: center; gap: 14px;
    font-size: 11px; color: var(--muted); flex-shrink: 0;
  }
  #monitor-header .title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--accent); letter-spacing: .05em;
    text-transform: uppercase;
  }
  .hstat { display: flex; align-items: center; gap: 5px; }
  .hstat .val { color: var(--text); font-weight: 500; font-size: 12px; }

  /* ════ Phase legend ════ */
  #phase-legend {
    display: flex; gap: 10px; margin-left: auto;
  }
  .ph-tag {
    display: flex; align-items: center; gap: 4px; font-size: 10px;
  }
  .ph-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* ════ Main: canvas + sidebars ════ */
  #monitor-body {
    flex: 1; display: flex; overflow: hidden;
  }

  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
  }
  #node-canvas {
    width: 100%; height: 100%; display: block;
  }

  /* ════ Right sidebar ════ */
  #sidebar {
    width: 200px; border-left: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 0;
    overflow-y: auto; flex-shrink: 0;
  }
  #sidebar::-webkit-scrollbar { width: 3px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); }

  .sblock {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sblock-title {
    font-size: 9px; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Field bars */
  .field-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .field-label { font-size: 9px; color: var(--muted); width: 60px; flex-shrink: 0; }
  .field-track {
    flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .field-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }

  /* P2 state */
  .p2-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 10px; }
  .p2-label { color: var(--muted); }
  .p2-val { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  .p2-IAM    { color: var(--green); }
  .p2-SENSING{ color: var(--blue); }
  .p2-IAMNOT { color: var(--red); }

  /* Verdict badge */
  .verdict-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 9px; letter-spacing: .06em; font-family: 'JetBrains Mono', monospace;
  }
  .verdict-ASSIMILATE { background: rgba(34,211,165,.15); color: var(--green); }
  .verdict-EXCRETE    { background: rgba(249,115,22,.15);  color: var(--orange); }
  .verdict-QUARANTINE { background: rgba(168,85,247,.15);  color: var(--purple); }

  /* Active nodes list */
  .node-item {
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    font-size: 10px; font-family: 'JetBrains Mono', monospace; cursor: default;
  }
  .node-ph { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .node-word { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .node-h { margin-left: auto; color: var(--muted); font-size: 9px; flex-shrink: 0; }

  /* DNH hint */
  #dnh-box {
    font-size: 10px; color: var(--muted); font-style: italic;
    font-family: 'JetBrains Mono', monospace; line-height: 1.4;
  }

  /* Bottom ticker */
  #tick-bar {
    padding: 5px 14px;
    border-top: 1px solid var(--border);
    font-size: 9px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    display: flex; gap: 16px; flex-shrink: 0;
    background: var(--panel);
  }
  .tick-item .k { color: var(--muted); }
  .tick-item .v { color: var(--text); margin-left: 4px; }
</style>
</head>
<body>

<!-- ════ LEFT: Chat Panel ════ -->
<div id="chat-panel">
  <div id="chat-header">
    <div class="logo">P</div>
    <div class="header-info">
      <h1>Pete v4</h1>
      <div class="sub" id="sub-status">Đang khởi động...</div>
    </div>
    <div id="status-dot"></div>
  </div>
  <div id="messages">
    <div class="msg pete">
      <div class="avatar">P</div>
      <div class="bubble">Pete v4 online. Nói chuyện đi.</div>
    </div>
  </div>
  <div id="input-row">
    <select id="mode-sel">
      <option value="NORMAL">⚙ NORMAL</option>
      <option value="DREAM">☁ DREAM</option>
      <option value="REFLECT">🔍 REFLECT</option>
    </select>
    <textarea id="msg-input" rows="1" placeholder="Nhắn gì đó..."></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- ════ RIGHT: Monitor Panel ════ -->
<div id="monitor">
  <div id="monitor-header">
    <span class="title">⚡ Primordial Monitor</span>
    <span class="hstat">TICK <span class="val" id="h-tick">0</span></span>
    <span class="hstat">S <span class="val" id="h-s">0</span></span>
    <span class="hstat">ATTN <span class="val" id="h-attn">—</span></span>
    <div id="phase-legend">
      <div class="ph-tag"><div class="ph-dot" style="background:var(--Sinh)"></div>Sinh</div>
      <div class="ph-tag"><div class="ph-dot" style="background:var(--Dan)"></div>Dan</div>
      <div class="ph-tag"><div class="ph-dot" style="background:var(--Chuyen)"></div>Chuyen</div>
      <div class="ph-tag"><div class="ph-dot" style="background:var(--Dung)"></div>Dung</div>
      <div class="ph-tag"><div class="ph-dot" style="background:var(--Hoai)"></div>Hoai</div>
    </div>
  </div>

  <div id="monitor-body">
    <!-- Canvas for node graph -->
    <div id="canvas-wrap">
      <canvas id="node-canvas"></canvas>
    </div>

    <!-- Right sidebar: field pressure + state -->
    <div id="sidebar">
      <!-- ODFS Field Pressure -->
      <div class="sblock">
        <div class="sblock-title">Field Pressure</div>
        <div id="field-bars"></div>
      </div>

      <!-- P2 State -->
      <div class="sblock">
        <div class="sblock-title">P2 State</div>
        <div id="p2-state"></div>
      </div>

      <!-- Verdict -->
      <div class="sblock">
        <div class="sblock-title">Lucis Verdict</div>
        <div id="verdict-box"></div>
      </div>

      <!-- Active Nodes -->
      <div class="sblock">
        <div class="sblock-title">Active Nodes</div>
        <div id="active-nodes-list"></div>
      </div>

      <!-- DNH Hint -->
      <div class="sblock">
        <div class="sblock-title">Gap Hint</div>
        <div id="dnh-box">—</div>
      </div>
    </div>
  </div>

  <!-- Bottom ticker -->
  <div id="tick-bar">
    <span class="tick-item"><span class="k">nodes</span><span class="v" id="tb-nodes">—</span></span>
    <span class="tick-item"><span class="k">field</span><span class="v" id="tb-field">—</span></span>
    <span class="tick-item"><span class="k">phase</span><span class="v" id="tb-phase">—</span></span>
    <span class="tick-item"><span class="k">lucis</span><span class="v" id="tb-lucis">—</span></span>
    <span class="tick-item"><span class="k">awareness</span><span class="v" id="tb-aware">—</span></span>
    <span class="tick-item" style="margin-left:auto"><span class="k">auto-refresh 2s</span></span>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// Pete v4 — Primordial Monitor
// ════════════════════════════════════════════════════════════

const PHASE_COLORS = {
  Sinh:   getComputedStyle(document.documentElement).getPropertyValue('--Sinh').trim(),
  Dan:    getComputedStyle(document.documentElement).getPropertyValue('--Dan').trim(),
  Chuyen: getComputedStyle(document.documentElement).getPropertyValue('--Chuyen').trim(),
  Dung:   getComputedStyle(document.documentElement).getPropertyValue('--Dung').trim(),
  Hoai:   getComputedStyle(document.documentElement).getPropertyValue('--Hoai').trim(),
  Vo:     '#1f2937',
};

const FIELD_COLORS = {
  emotion:    '#f43f5e',
  logic:      '#38bdf8',
  reflection: '#a855f7',
  visual:     '#22d3a5',
  language:   '#eab308',
  intuition:  '#f97316',
};

const FIELDS = ['emotion','logic','reflection','visual','language','intuition'];

// ── Canvas setup ─────────────────────────────────────────────
const canvas  = document.getElementById('node-canvas');
const ctx     = canvas.getContext('2d');
let W = 0, H = 0;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width  = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();

// ── Node graph state (force-directed) ────────────────────────
let gNodes = [];   // {id, x, y, vx, vy, phase, H, field, radius}
let gEdges = [];   // {from, to, layer}
let animId  = null;

function initNodes(nodes, edges) {
  // Preserve positions if node already exists
  const posMap = {};
  gNodes.forEach(n => posMap[n.id] = {x: n.x, y: n.y});

  gNodes = nodes.map((n, i) => {
    const angle = (i / nodes.length) * Math.PI * 2;
    const r     = Math.min(W, H) * 0.3;
    const prev  = posMap[n.id];
    return {
      id:     n.id,
      x:      prev ? prev.x : W/2 + Math.cos(angle) * r,
      y:      prev ? prev.y : H/2 + Math.sin(angle) * r,
      vx: 0, vy: 0,
      phase:  n.phase || 'Dan',
      H:      n.H || 1,
      field:  n.field || 'logic',
      radius: 8 + Math.min(n.H || 1, 18) * 0.7,
    };
  });
  gEdges = edges || [];
}

// ── Force simulation ─────────────────────────────────────────
function step() {
  const n = gNodes.length;
  if (n === 0) return;

  // Repulsion between all nodes
  for (let i = 0; i < n; i++) {
    for (let j = i+1; j < n; j++) {
      const a = gNodes[i], b = gNodes[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const force = 2400 / (dist * dist);
      const fx = (dx / dist) * force, fy = (dy / dist) * force;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }

  // Attraction along edges
  const nodeMap = {};
  gNodes.forEach(n => nodeMap[n.id] = n);
  gEdges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const ideal = e.layer === 3 ? 130 : 100;
    const force = (dist - ideal) * 0.04;
    const fx = (dx/dist)*force, fy = (dy/dist)*force;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  });

  // Center gravity
  gNodes.forEach(n => {
    n.vx += (W/2 - n.x) * 0.01;
    n.vy += (H/2 - n.y) * 0.01;
  });

  // Damping + clamp
  const PAD = 30;
  gNodes.forEach(n => {
    n.vx *= 0.8; n.vy *= 0.8;
    n.x = Math.max(PAD, Math.min(W - PAD, n.x + n.vx));
    n.y = Math.max(PAD, Math.min(H - PAD, n.y + n.vy));
  });
}

// ── Animated particles along edges (L1→L2→L3 flow) ──────────
let particles = [];  // {x, y, tx, ty, t, color, speed}

function spawnParticles(edges) {
  particles = [];
  const nodeMap = {};
  gNodes.forEach(n => nodeMap[n.id] = n);
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    // Spawn 2 particles per edge
    for (let k = 0; k < 2; k++) {
      particles.push({
        fromId: e.from, toId: e.to,
        t: Math.random(),
        speed: 0.004 + Math.random() * 0.004,
        color: e.layer === 3 ? '#f97316' : '#7c6cf9',
        size:  1.5 + (e.layer === 3 ? 1 : 0),
      });
    }
  });
}

// ── Draw ─────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  const nodeMap = {};
  gNodes.forEach(n => nodeMap[n.id] = n);

  // Edges
  gEdges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = e.layer === 3
      ? 'rgba(249,115,22,0.2)'
      : 'rgba(124,108,249,0.2)';
    ctx.lineWidth = e.layer === 3 ? 1.5 : 1;
    ctx.setLineDash(e.layer === 3 ? [4,4] : []);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Particles
  particles.forEach(p => {
    const a = nodeMap[p.fromId], b = nodeMap[p.toId];
    if (!a || !b) return;
    p.t = (p.t + p.speed) % 1;
    const px = a.x + (b.x - a.x) * p.t;
    const py = a.y + (b.y - a.y) * p.t;
    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });

  // Nodes
  gNodes.forEach(n => {
    const color = PHASE_COLORS[n.phase] || PHASE_COLORS.Dan;
    const r     = n.radius;

    // Glow ring
    const grd = ctx.createRadialGradient(n.x, n.y, r*0.4, n.x, n.y, r*1.8);
    grd.addColorStop(0, color + '30');
    grd.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.arc(n.x, n.y, r*1.8, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();

    // Circle
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle   = color + '22';
    ctx.strokeStyle = color;
    ctx.lineWidth   = 1.5;
    ctx.fill(); ctx.stroke();

    // Phase indicator (inner dot)
    ctx.beginPath(); ctx.arc(n.x, n.y, r*0.28, 0, Math.PI*2);
    ctx.fillStyle = color + 'bb'; ctx.fill();

    // Label
    ctx.fillStyle = '#e2e0ff';
    ctx.font = `${Math.min(11, r*0.75)}px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = n.id.length > 10 ? n.id.slice(0, 9) + '…' : n.id;
    ctx.fillText(label, n.x, n.y + r + 11);

    // H value above
    ctx.fillStyle = color + 'aa';
    ctx.font = '8px JetBrains Mono';
    ctx.fillText(`H${n.H}`, n.x, n.y - r - 5);
  });
}

// ── Animation loop ───────────────────────────────────────────
function animate() {
  step();
  draw();
  animId = requestAnimationFrame(animate);
}
animate();

// ── Field bar rendering ──────────────────────────────────────
function renderFieldBars(field) {
  const el = document.getElementById('field-bars');
  el.innerHTML = FIELDS.map(f => {
    const v = field[f] || 0;
    const w = Math.round(v * 100);
    const col = FIELD_COLORS[f];
    return `<div class="field-bar">
      <span class="field-label">${f}</span>
      <div class="field-track">
        <div class="field-fill" style="width:${w}%;background:${col}"></div>
      </div>
    </div>`;
  }).join('');
}

// ── P2 state rendering ───────────────────────────────────────
function renderP2(p2) {
  const el = document.getElementById('p2-state');
  const aw = p2.awareness || '—';
  const awCls = `p2-${aw}`;
  el.innerHTML = `
    <div class="p2-row"><span class="p2-label">awareness</span><span class="p2-val ${awCls}">${aw}</span></div>
    <div class="p2-row"><span class="p2-label">phase</span><span class="p2-val">${p2.phase || '—'}</span></div>
    <div class="p2-row"><span class="p2-label">iam_streak</span><span class="p2-val">${p2.iam_streak ?? 0}</span></div>
  `;
}

// ── Verdict ──────────────────────────────────────────────────
function renderVerdict(verdict, lucis_class) {
  const el = document.getElementById('verdict-box');
  el.innerHTML = `<span class="verdict-badge verdict-${verdict}">${verdict}</span>
  <span style="font-size:9px;color:var(--muted);margin-left:6px">${lucis_class}</span>`;
}

// ── Active nodes list ────────────────────────────────────────
function renderActiveNodes(nodes) {
  const el = document.getElementById('active-nodes-list');
  el.innerHTML = nodes.map(n => {
    const col = PHASE_COLORS[n.phase] || '#aaa';
    return `<div class="node-item">
      <div class="node-ph" style="background:${col}"></div>
      <span class="node-word">${n.id}</span>
      <span class="node-h">${n.H}</span>
    </div>`;
  }).join('');
}

// ── Fetch + update loop ──────────────────────────────────────
let _loading = true;
let _prevEdges = [];

async function fetchStats() {
  try {
    const r = await fetch('/stats');
    const s = await r.json();
    const ready = s.loading === false;
    document.getElementById('status-dot').className = ready ? 'ready' : '';
    document.getElementById('sub-status').textContent =
      ready ? `${s.nodes.toLocaleString()} nodes · ready` : (s.load_progress || 'Loading...');
    document.getElementById('tb-nodes').textContent = s.nodes || '—';
    _loading = !ready;
  } catch(e) {}
}

async function fetchPrimordial() {
  if (_loading) return;
  try {
    const r = await fetch('/primordial');
    const d = await r.json();

    // Header
    document.getElementById('h-tick').textContent = d.tick || 0;
    document.getElementById('h-s').textContent    = (d.S_combined||0).toFixed(2);
    document.getElementById('h-attn').textContent = d.attn_mode || '—';

    // Ticker bar
    document.getElementById('tb-field').textContent  = d.dominant_field || '—';
    document.getElementById('tb-phase').textContent  = d.p2?.phase || '—';
    document.getElementById('tb-lucis').textContent  = d.lucis_class || '—';
    document.getElementById('tb-aware').textContent  = d.p2?.awareness || '—';

    // Field bars
    if (d.field) renderFieldBars(d.field);

    // P2 state
    if (d.p2) renderP2(d.p2);

    // Verdict
    renderVerdict(d.verdict || '—', d.lucis_class || '');

    // DNH hint
    document.getElementById('dnh-box').textContent = d.dnh_hint || '—';

    // Active nodes list
    if (d.nodes) {
      renderActiveNodes(d.nodes);

      // Update graph
      const edgesChanged = JSON.stringify(d.edges) !== JSON.stringify(_prevEdges);
      initNodes(d.nodes, d.edges);
      if (edgesChanged) {
        spawnParticles(d.edges);
        _prevEdges = d.edges;
      }
    }
  } catch(e) {}
}

// Kick off background polling
async function poll() {
  await fetchStats();
  await fetchPrimordial();
}
poll();
setInterval(poll, 2000);

// ── Chat send ─────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('msg-input');

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="avatar">${role==='pete'?'P':'U'}</div>
  <div class="bubble">${text}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMsg() {
  const text = inputEl.value.trim();
  if (!text) return;
  const mode = document.getElementById('mode-sel').value;
  inputEl.value = '';
  addMsg('user', text);

  const pending = document.createElement('div');
  pending.className = 'msg pete';
  pending.innerHTML = '<div class="avatar">P</div><div class="bubble" style="color:var(--muted)">...</div>';
  messagesEl.appendChild(pending);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, mode}),
    });
    const d = await r.json();
    pending.querySelector('.bubble').textContent = d.text || '[no response]';
    pending.querySelector('.bubble').style.color = '';
    // Immediately fetch new primordial state
    await fetchPrimordial();
  } catch(e) {
    pending.querySelector('.bubble').textContent = '[error]';
  }
}

document.getElementById('send-btn').onclick = sendMsg;
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
</script>
